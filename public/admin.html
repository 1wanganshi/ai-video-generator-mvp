<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台任务中心</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar admin-topbar">
          <div>
            <p class="eyebrow">Backend</p>
            <h1>后台任务中心</h1>
          </div>
          <div class="top-actions">
            <a class="ghost-link" href="/">返回前台</a>
            <div class="status-pill" id="adminStatus">连接中</div>
          </div>
        </header>

        <nav class="admin-tabs" aria-label="后台模块">
          <button class="admin-tab active" data-admin-tab="models" type="button">大模型</button>
          <button class="admin-tab" data-admin-tab="content-modules" type="button">短视频模块</button>
          <button class="admin-tab" data-admin-tab="tts-model" type="button">TTS 模型</button>
          <button class="admin-tab" data-admin-tab="prompts" type="button">提示词模块</button>
          <button class="admin-tab" data-admin-tab="jobs" type="button">生成记录</button>
        </nav>

        <section class="admin-grid">
          <article class="metric panel">
            <span>当前任务</span>
            <strong id="activeJob">无</strong>
          </article>
          <article class="metric panel">
            <span>排队任务</span>
            <strong id="waitingCount">0</strong>
          </article>
          <article class="metric panel">
            <span>任务总数</span>
            <strong id="jobCount">0</strong>
          </article>
        </section>

        <p class="error admin-message" id="adminMessage" role="alert"></p>

        <section class="panel admin-panel admin-view active" data-admin-view="models">
          <div class="section-head">
            <div>
              <p class="eyebrow">AI Models</p>
              <h2>大模型</h2>
            </div>
            <button class="small-button" id="saveModelsButton" type="button">保存大模型</button>
          </div>
          <p class="hint">填写 API 地址、API Key 和模型名后点击保存，系统会先测试语言大模型和图片大模型，通过后才保存。</p>
          <div class="preset-row" id="llmPresetButtons"></div>
          <div class="model-grid two-columns">
            <article class="config-block">
              <h3>语言大模型</h3>
              <label class="check-row"><input id="llmEnabled" type="checkbox" /> 启用语言大模型分镜</label>
              <label>供应商</label>
              <select id="llmProvider">
                <option value="openai-compatible">OpenAI Compatible</option>
                <option value="anthropic">Anthropic Claude</option>
                <option value="aliyun-bailian">阿里百炼 OpenAI Compatible</option>
                <option value="local">本地模型</option>
              </select>
              <label>Base URL</label>
              <input id="llmBaseUrl" type="text" placeholder="https://api.openai.com/v1" />
              <label>API Key</label>
              <input id="llmApiKey" type="password" autocomplete="off" />
              <label>模型名</label>
              <input id="llmModel" type="text" placeholder="gpt-4o-mini" />
              <button class="small-button full" data-test-model="llm" type="button">测试语言大模型</button>
            </article>

            <article class="config-block">
              <h3>图片大模型</h3>
              <label class="check-row"><input id="imageEnabled" type="checkbox" /> 启用图片生成模型</label>
              <label>供应商</label>
              <select id="imageProvider">
                <option value="image2">GPT Image 2 / image2</option>
                <option value="openai-compatible">OpenAI Compatible</option>
                <option value="stability">Stability</option>
                <option value="midjourney-proxy">Midjourney Proxy</option>
                <option value="volcengine">火山引擎</option>
                <option value="local">本地模型</option>
              </select>
              <label>Base URL</label>
              <input id="imageBaseUrl" type="text" />
              <label>API Key</label>
              <input id="imageApiKey" type="password" autocomplete="off" />
              <label>模型名</label>
              <input id="imageModel" type="text" placeholder="gpt-image-2" />
              <label>尺寸</label>
              <input id="imageSize" type="text" placeholder="1536x864" />
              <label>质量</label>
              <select id="imageQuality">
                <option value="high">high</option>
                <option value="medium">medium</option>
                <option value="low">low</option>
                <option value="auto">auto</option>
              </select>
              <label>输出格式</label>
              <select id="imageOutputFormat">
                <option value="png">png</option>
                <option value="jpeg">jpeg</option>
                <option value="webp">webp</option>
              </select>
              <label>背景</label>
              <select id="imageBackground">
                <option value="auto">auto</option>
                <option value="opaque">opaque</option>
                <option value="transparent">transparent</option>
              </select>
              <button class="small-button full" data-test-model="image" type="button">测试图片大模型</button>
            </article>
          </div>
        </section>

        <section class="panel admin-panel admin-view" data-admin-view="content-modules">
          <div class="section-head">
            <div>
              <p class="eyebrow">Short Video Modules</p>
              <h2>短视频模块</h2>
            </div>
            <div class="section-actions">
              <button class="small-button" id="addContentModuleButton" type="button">新增模块</button>
              <button class="small-button" id="saveContentModulesButton" type="button">保存短视频模块</button>
            </div>
          </div>
          <p class="hint">后台选择哪个模块，前台就展示对应内容；生成分镜时也会自动带上该模块的提示词逻辑。</p>
          <div class="content-module-list" id="contentModuleList"></div>
        </section>

        <section class="panel admin-panel admin-view" data-admin-view="tts-model">
          <div class="section-head">
            <div>
              <p class="eyebrow">TTS Model</p>
              <h2>TTS 模型与声音克隆</h2>
            </div>
            <button class="small-button" id="saveTtsModelButton" type="button">保存 TTS 模型</button>
          </div>

          <div class="model-grid two-columns">
            <article class="config-block">
              <h3>TTS 模型</h3>
              <label class="check-row"><input id="ttsEnabled" type="checkbox" /> 启用旁白</label>
              <label class="check-row"><input id="ttsCloneEnabled" type="checkbox" /> 允许克隆音色</label>
              <label>供应商</label>
              <select id="ttsProvider">
                <option value="local-ffmpeg">本地预览</option>
                <option value="aliyun-dashscope">阿里百炼 DashScope</option>
                <option value="openai-compatible">OpenAI Compatible</option>
                <option value="elevenlabs">ElevenLabs</option>
                <option value="minimax">MiniMax</option>
                <option value="index-tts">IndexTTS</option>
              </select>
              <label>Base URL</label>
              <input id="ttsBaseUrl" type="text" />
              <label>API Key</label>
              <input id="ttsApiKey" type="password" autocomplete="off" />
              <label>模型名</label>
              <input id="ttsModel" type="text" placeholder="qwen3-tts-vc-2026-01-22" />
              <label>复刻模型</label>
              <input id="ttsCloneModel" type="text" placeholder="qwen-voice-enrollment" />
              <label>复刻目标模型</label>
              <input id="ttsCloneTargetModel" type="text" placeholder="qwen3-tts-vc-2026-01-22" />
              <label>语种</label>
              <select id="ttsLanguageType">
                <option value="Chinese">Chinese</option>
                <option value="English">English</option>
                <option value="Auto">Auto</option>
              </select>
              <label>默认音色</label>
              <select id="defaultVoiceSelect"></select>
              <button class="small-button full" data-test-model="tts" type="button">测试 TTS 模型</button>
              <button class="small-button full" id="setDefaultVoiceButton" type="button">设为默认音色</button>
            </article>

            <article class="config-block">
              <h3>TTS 声音克隆</h3>
              <form class="voice-form stacked" id="voiceCloneForm">
                <label>音色名称</label>
                <input name="name" type="text" placeholder="例如：创始人口播音色" />
                <label>声音样本</label>
                <input name="sample" type="file" accept="audio/*" required />
                <label class="check-row">
                  <input name="authorized" type="checkbox" required />
                  已获得声音样本本人授权
                </label>
                <button class="primary-button compact" type="submit">上传并创建克隆音色</button>
              </form>
              <div class="voice-list" id="voiceList"></div>
            </article>
          </div>
        </section>

        <section class="panel admin-panel admin-view" data-admin-view="prompts">
          <div class="section-head">
            <div>
              <p class="eyebrow">Prompts</p>
              <h2>提示词模块</h2>
            </div>
            <button class="small-button" id="savePromptsButton" type="button">保存提示词</button>
          </div>
          <div class="prompt-list" id="promptList"></div>
        </section>

        <section class="panel admin-panel admin-view" data-admin-view="jobs">
          <div class="section-head">
            <div>
              <p class="eyebrow">Jobs</p>
              <h2>生成记录</h2>
            </div>
            <button class="small-button" id="refreshButton" type="button">刷新</button>
          </div>
          <div class="job-table" id="jobTable"></div>
        </section>
      </section>
    </main>

    <script src="/admin.js" type="module"></script>
  </body>
</html>
